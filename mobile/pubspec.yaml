name: pmp_mobile
description: Procurement Management Platform - Supplier Portal Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP Client
  dio: ^5.4.0

  # Local Database / Offline Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network Detection
  connectivity_plus: ^5.0.2

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.7
  mockito: ^5.4.4
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
