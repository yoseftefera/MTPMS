name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend Tests (PHPUnit / Pest)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (PHP 8.3)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: pmp_test
          MYSQL_USER: pmp_test
          MYSQL_PASSWORD: pmp_test_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, redis, mbstring, xml, ctype, json, bcmath, fileinfo, tokenizer, openssl
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy test environment file
        working-directory: ./backend
        run: cp .env.example .env.testing

      - name: Configure test environment
        working-directory: ./backend
        run: |
          php artisan key:generate --env=testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pmp_test/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=pmp_test/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=pmp_test_secret/' .env.testing
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env.testing
          sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=/' .env.testing

      - name: Run database migrations
        working-directory: ./backend
        run: php artisan migrate --env=testing --force

      - name: Run tests with coverage
        working-directory: ./backend
        run: php artisan test --parallel --coverage --min=80
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_DATABASE: pmp_test
          DB_USERNAME: pmp_test
          DB_PASSWORD: pmp_test_secret
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ""
          QUEUE_CONNECTION: sync
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          MAIL_MAILER: array

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Tests (Jest / Vitest)
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:ci
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost/api/v1
          NEXT_PUBLIC_PUSHER_KEY: test-key
          NEXT_PUBLIC_PUSHER_HOST: localhost
          NEXT_PUBLIC_PUSHER_PORT: "6001"

      - name: Build Next.js application
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api/v1
          NEXT_PUBLIC_PUSHER_KEY: test-key
          NEXT_PUBLIC_PUSHER_HOST: localhost
          NEXT_PUBLIC_PUSHER_PORT: "6001"

  # ─────────────────────────────────────────────────────────────────────────────
  # Code Quality & Security Checks
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, phpstan, php-cs-fixer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan static analysis
        working-directory: ./backend
        run: vendor/bin/phpstan analyse --memory-limit=512M
        continue-on-error: true

      - name: Check PHP code style
        working-directory: ./backend
        run: vendor/bin/pint --test
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & Deploy (main branch only, after all tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pmp-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pmp-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_PUSHER_KEY=${{ secrets.PUSHER_APP_KEY }}
            NEXT_PUBLIC_PUSHER_HOST=${{ secrets.PUSHER_HOST }}
            NEXT_PUBLIC_PUSHER_PORT=${{ secrets.PUSHER_PORT }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            cd /opt/pmp
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache
            docker image prune -f

      - name: Notify deployment status
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Deployment ${{ job.status }}: ${{ github.repository }} @ ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
