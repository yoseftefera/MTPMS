version: '3.9'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pmp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pmp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
      - NEXT_PUBLIC_PUSHER_KEY=${PUSHER_APP_KEY}
      - NEXT_PUBLIC_PUSHER_HOST=localhost
      - NEXT_PUBLIC_PUSHER_PORT=6001
    depends_on:
      - app
    networks:
      - pmp-network

  nginx:
    image: nginx:1.25-alpine
    container_name: pmp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
      - frontend
    networks:
      - pmp-network

  mysql:
    image: mysql:8.0
    container_name: pmp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-pmp_development}
      MYSQL_USER: ${DB_USERNAME:-pmp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pmp_secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pmp-network

  redis:
    image: redis:7-alpine
    container_name: pmp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmp-network

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pmp_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=notifications,default,reports --tries=3 --backoff=60 --sleep=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmp-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pmp_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmp-network

  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: pmp_soketi
    restart: unless-stopped
    environment:
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-pmp-app-id}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY:-pmp-app-key}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET:-pmp-app-secret}
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "false"
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: "100"
      SOKETI_DEBUG: "0"
    ports:
      - "6001:6001"
      - "9601:9601"
    networks:
      - pmp-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  pmp-network:
    driver: bridge
